services:
  postgres:
    image: postgres:latest
    container_name: advanceddb_01assignment_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    volumes:
      - pgdata:/var/lib/postgresql

  refresh_cron:
    image: alpine:latest
    container_name: advanceddb_01assignment_refresh_cron
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: supersecretpassword
    volumes:
      - ./cron/root:/etc/crontabs/root:ro
      - ./cron/refresh_mview.sh:/opt/cron/refresh_mview.sh:ro
    command: ["sh", "-c", "apk add --no-cache postgresql-client && chmod +x /opt/cron/refresh_mview.sh && crond -f -l 8 -L /var/log/cron.log"]

  seed_data:
    image: python:slim
    container_name: advanceddb_01assignment_seed_data
    profiles:
      - seed
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: supersecretpassword
      SEED_CUSTOMERS: 20
      SEED_ACCOUNTS_PER_CUSTOMER: 2
      SEED_CARDS_PER_ACCOUNT: 2
      SEED_TRANSACTIONS_PER_ACCOUNT: 15
      SEED_HIGH_RISK_RATIO: 0.15
      SEED_RESET: 0
    volumes:
      - ./seed/seed_data.py:/opt/seed/seed_data.py:ro
    command: ["sh", "-c", "pip install --no-cache-dir psycopg[binary] && python /opt/seed/seed_data.py"]

volumes:
  pgdata: